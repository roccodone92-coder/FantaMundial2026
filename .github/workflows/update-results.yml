name: Aggiorna risultati Mondiale

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installa dipendenze
        run: npm install

      - name: Aggiorna risultati
        run: node update-results.mjs
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          COMPETITION_CODE: WC
          SEASON: '2026'

      - name: Commit risultati
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Aggiorna risultati e classifica
          file_pattern: results.json
