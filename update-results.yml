name: Aggiorna risultati Mondiale

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Scarica repository
        uses: actions/checkout@v4

      - name: Configura Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installa dipendenze
        run: npm install

      - name: Aggiorna risultati
        run: node update-results.mjs
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
          COMPETITION_CODE: WC
          SEASON: '2026'

      - name: Verifica modifiche
        run: |
          echo "Controllo modifiche..."
          git status
          cat results.json | head -20

      - name: Commit e push risultati
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json
          git commit -m "Aggiorna risultati e classifica" || echo "Nessuna modifica da salvare"
          git push
